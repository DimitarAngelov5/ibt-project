<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Catcher in the Rye - Book Details</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>

<body>
    <div class="container">
        <h1>The Catcher in the Rye</h1>
        <img src="assets\the_catcher_in_the_rye.jpg" alt="The Catcher in the Rye">
        <h2>Brief Description</h2>
        <p>A novel by J.D. Salinger about teenage angst.</p>
        <h2>Full Description</h2>
        <p>The Catcher in the Rye is a novel by J.D. Salinger, published in 1951. It is a story about teenage alienation
            and loss.</p>
        <h2>Price: $11.99</h2>

        <h2>Purchase Form</h2>
        <form id="purchaseForm">
            <label for="name">Name:</label>
            <input type="text" id="nameInput" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" min="1" value="1" required>
            <input type="submit" value="Purchase">
        </form>

        <h2>Submit Your Review</h2>
        <form id="reviewForm">
            <label for="review">Your Review:</label>
            <textarea id="reviewInput" name="review" required></textarea>
            <input type="submit" value="Submit Review">
        </form>

        <h2>User Reviews</h2>
        <div id="reviewContainer">
        </div>
    </div>
</body>

</html>
